name: Rawocado Commit Release

on:
  push:

jobs:
  nightly-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      APT_CACHE_DIR: ${{ github.workspace }}/.apt-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore apt package cache
        uses: actions/cache@v4
        with:
          path: ${{ env.APT_CACHE_DIR }}
          key: apt-${{ runner.os }}-mingw-w64-v1

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-mingw-w64-v1
          restore-keys: |
            ccache-${{ runner.os }}-mingw-w64-

      - name: Install cross-compiler toolchain
        run: |
          mkdir -p "${APT_CACHE_DIR}/partial"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            -o Dir::Cache::archives="${APT_CACHE_DIR}" \
            make g++-mingw-w64-x86-64 zip ccache

      - name: Configure ccache
        run: |
          ccache --max-size=1G
          ccache --zero-stats

      - name: Build
        run: make -j"$(nproc)" CC="ccache x86_64-w64-mingw32-g++-posix" build

      - name: Bundle runtime files
        run: |
          set -euo pipefail

          mkdir -p dist
          cp RAWocado.exe dist/
          cp *.ico dist/ 2>/dev/null || true

          mapfile -t deps < <(x86_64-w64-mingw32-objdump -p RAWocado.exe | awk '/DLL Name:/{print $3}' | sort -u)
          missing=()

          is_system_dll() {
            local u
            u="$(echo "$1" | tr '[:lower:]' '[:upper:]')"
            case "$u" in
              KERNEL32.DLL|USER32.DLL|GDI32.DLL|OPENGL32.DLL|COMDLG32.DLL|OLE32.DLL|UUID.DLL|SHELL32.DLL|ADVAPI32.DLL|WS2_32.DLL|IMM32.DLL|WINMM.DLL|VERSION.DLL|SETUPAPI.DLL|NTDLL.DLL|SHLWAPI.DLL|COMCTL32.DLL|RPCRT4.DLL|MSVCRT.DLL)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          for dll in "${deps[@]}"; do
            if is_system_dll "$dll"; then
              continue
            fi

            found=""
            for p in . vendor/libraw/bin /usr/x86_64-w64-mingw32/bin; do
              if [ -f "$p/$dll" ]; then
                found="$p/$dll"
                break
              fi

              # objdump may report uppercase names while files are lowercase on Linux.
              ci_match="$(find "$p" -maxdepth 1 -type f -iname "$dll" -print -quit 2>/dev/null || true)"
              if [ -n "$ci_match" ]; then
                found="$ci_match"
                break
              fi
            done

            if [ -n "$found" ]; then
              cp "$found" dist/
            else
              # Fallback: fetch LibRaw runtime package if libraw.dll is required but absent in repo.
              dll_upper="$(echo "$dll" | tr '[:lower:]' '[:upper:]')"
              if [ "$dll_upper" = "LIBRAW.DLL" ]; then
                tmp_dir="$(mktemp -d)"
                curl -fsSL "https://www.libraw.org/data/LibRaw-0.22.1-Win64.zip" -o "$tmp_dir/libraw.zip"
                unzip -q "$tmp_dir/libraw.zip" -d "$tmp_dir"
                fallback_libraw="$(find "$tmp_dir" -type f -iname "libraw.dll" -print -quit)"
                if [ -n "$fallback_libraw" ]; then
                  cp "$fallback_libraw" "dist/libraw.dll"
                  found="dist/libraw.dll"
                fi
                rm -rf "$tmp_dir"
              fi

              if [ -z "$found" ]; then
              missing+=("$dll")
              fi
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing non-system runtime DLLs: ${missing[*]}"
            exit 1
          fi

          cat > dist/BUILD_INFO.txt <<EOF
          Commit: ${GITHUB_SHA}
          Ref: ${GITHUB_REF}
          Event: ${GITHUB_EVENT_NAME}
          Workflow: ${GITHUB_WORKFLOW}
          Run Number: ${GITHUB_RUN_NUMBER}
          Built At (UTC): $(date -u +"%Y-%m-%d %H:%M:%S")
          EOF

          short_sha="${GITHUB_SHA::7}"
          echo "SHORT_SHA=${short_sha}" >> $GITHUB_ENV
          mv dist rawocado
          zip -9 -r "RAWocado-${short_sha}.zip" rawocado

      - name: Publish commit release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: commit-${{ env.SHORT_SHA }}
          name: Commit ${{ env.SHORT_SHA }}
          prerelease: false
          make_latest: true
          generate_release_notes: false
          body: |
            Automated build from commit ${{ github.sha }}.
          files: |
            RAWocado-*.zip
